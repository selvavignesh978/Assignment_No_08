<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

    <!-- Internal css -->
    <style>
        /* Add your custom styles here */
        body{
         margin: 0;
         padding: 0;
         box-sizing: border-box;
        }
         
         .main_container{
            width: 100%;
            height: 100vh;
            background-color: #f8f9fa;
         }
         .Task_Header{
            background-color: #343a40;
            color: #fff;
            align-items: center;
            justify-content: center;
         }
         input[type="text"]{
            border: none;
            outline: none;
            padding: 10px;
            font-size: 16px;
            border-radius: 15px;
         }

    </style>
</head>
<body>
    <!-- Todo list task -->
     <main class="main_container">
        <!-- Task_header -->
         <header class="Task_Header d-flex p-3 ">
            <input type="text" placeholder="Enter task..." name="Task_Name" class="form-control w-50">
         </header>
            <!-- Body content  -->
          <section class="Task_Body d-grid p-3">
            <!-- Task_body -->
             <div class="user_action d-flex justify-content-between">
                <!-- create_Task -->
                 <div class="create_task"></div>
                 <!-- Task_status -->
                  <div class="Task_status"></div>
             </div>
            <!-- Task_container -->
             <div class="Task_container d-grid gap-2"></div>
          </section>

          <!-- External Script -->
           <script src="script.js"></script>
          
     </main>
</body>
</html>
